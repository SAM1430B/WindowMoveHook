[General]
; Wait time in seconds before finding the game window.
Wait=50

; Set to 1 to physically move and resize the game window on your monitor based on the Width/Height/PosX/PosY below.
TransmitTheWindow=0

; Set to 1 to ignore the Width/Height/PosX/PosY below and just lock the window to whatever size it currently is.
GetWindowDimensionsThenSet=0

; `DontGetSize` and `DontGetPosition` only used if GetWindowDimensionsThenSet=1
; Set to 1 to skip capturing the current window dimensions (use from INI instead)
DontGetSize=0
DontGetPosition=0

; The physical size and position you want the window to be on your screen.
Width=0
Height=0
PosX=0
PosY=0


[FakeSize]
; Set to 1 to trick the game into thinking it is running at a different resolution than the physical window.
Enable=0

; The internal resolution the game engine will actually use to render the game and menus.
; IMPORTANT: For games with hardcoded UI, this MUST exactly match the resolution chosen inside the game's options.
FakeWidth=1920
FakeHeight=1080

[FindWindow]
; Leave empty to auto-detect the main window, or type the exact name to target a specific window.
WindowName=
ClassName=

[Hooks]
; Set to 1 to enable specific hooks
SetWindowPos=0
MoveWindow=0
AdjustWindowRect=0